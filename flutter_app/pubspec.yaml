name: albafit
description: "AlbaFit — Personal Work & Salary Manager (Flutter skeleton)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0                # backend API (mavjud Node/Express serveriga ulanadi)
  provider: ^6.1.2            # holat boshqaruvi (AuthProvider)
  shared_preferences: ^2.2.3 # token/sozlamalarni saqlash
  intl: ^0.19.0              # sana/valyuta formatlash

  # Keyingi bosqichlarda qo'shiladigan tavsiya etilgan paketlar (skeletonda ishlatilmagan):
  #   fl_chart          -> Finance/Analytics grafiklari (donut, bar)
  #   flutter_local_notifications + timezone -> Shift/maosh eslatmalari (push)
  #   in_app_purchase   -> Google Play / App Store premium obuna (store billing)
  #   home_widget        -> Android/iOS home screen widget
  #   google_sign_in + googleapis -> Google Drive backup

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
