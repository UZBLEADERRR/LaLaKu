name: albafit
description: "AlbaFit — Personal Work & Salary Manager (Flutter skeleton)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0                # backend API (mavjud Node/Express serveriga ulanadi)
  provider: ^6.1.2            # holat boshqaruvi (AuthProvider)
  shared_preferences: ^2.2.3 # token/sozlamalarni saqlash
  intl: ^0.19.0              # sana/valyuta formatlash
  flutter_local_notifications: ^17.2.3  # lokal bildirishnomalar (maslahat, eslatma)
  timezone: ^0.9.4                       # rejalashtirilgan bildirishnoma vaqti
  flutter_timezone: ^3.0.1               # qurilma vaqt mintaqasini aniqlash
  fl_chart: ^0.68.0                       # moliya grafiklari (donut, bar)
  in_app_purchase: ^3.2.0                 # Google Play / App Store premium obuna
  webview_flutter: ^4.7.0                 # oshxona (business) paneli — web ilova WebView'da

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
