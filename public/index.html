<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#5b5bd6">
  <title>AlbaFit — Ish vaqti va moliya</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div class="loading-screen"><div class="spinner"></div></div>
  </div>

  <nav id="bottom-nav" class="bottom-nav hidden"></nav>

  <!-- Skaner oynasi -->
  <div id="scanner" class="scanner hidden">
    <video id="scanner-video" playsinline muted></video>
    <div class="scanner-frame"><span></span></div>
    <div class="scanner-hint" id="scanner-hint">QR kodni ramka ichiga joylashtiring</div>
    <button class="scanner-cancel" id="scanner-cancel">Bekor qilish</button>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/vendor/jsQR.js"></script>
  <script src="/i18n.js"></script>
  <script src="/i18n-extra.js"></script>
  <script src="/app.js"></script>
</body>
</html>
